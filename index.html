<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Presentes - Ana & Lucas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="tag-container">
            <img src="img/tag.jpeg" alt="Tag Casamento Ana e Lucas" class="tag-imagem">
        </div>
        
        <h1>Ana & Lucas</h1>

        <!-- Seção do Local com Flexbox -->
        <div class="igreja-container">
            <div class="igreja-wrapper">
                <img src="img/igreja.jpeg" alt="Igreja São Miguel Arcanjo" class="igreja-ilustracao">
                
                <div class="igreja-info">
                    <h3>A Cerimônia</h3>
                    <p><strong>Data:</strong> Sábado, 24 de Outubro de 2026</p>
                    <p><strong>Horário:</strong> 15:00 horas</p>
                    <p><strong>Local:</strong> Igreja São Miguel Arcanjo</p>
                    <p class="endereco">Sítio do - Fazenda São Miguel, Atalho, s/n<br>
                    João Paulo II, Barbacena - MG</p>
                </div>
            </div>
        </div>

        <p class="subtitle">Nossa Lista de Presentes</p>
        <div class="divider"></div>
    </header>

    <main class="container">
        <section id="lista-presentes" class="grid-presentes">
            <!-- Os itens serão inseridos aqui pelo JavaScript -->
        </section>
    </main>

    <footer>
        <p>Com carinho, Ana e Lucas</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
